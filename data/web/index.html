<!DOCTYPE html>
<html>
<head>
  <title>PhotoFrame 2.2</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>PhotoFrame 2.2</h1>
  <div class="container">
    <p>Use the following options:</p>
    <a href="/upload_file" class="button">Upload a New Image</a>
    <a href="/convert" class="button secondary">Convert &amp; Resize Image</a>
    <a href="/delete" class="button">Delete Files</a>
    <a href="/speed" class="button">Set Slideshow Speed</a>
    <a href="/display" class="button">Display Settings</a>
    <a href="/slideshow" class="button">View Slideshow</a>
    <a href="/status" class="button">Status</a>
    <a href="/about" class="button">About</a>
    <form method="post" action="/toggle-pause" style="display:inline-block">
      <button type="submit" class="%PAUSE_BTN_CLASS%">%PAUSE_LABEL%</button>
    </form>
    <form method="post" action="/toggle-shuffle" style="display:inline-block">
      <button type="submit" class="%SHUFFLE_BTN_CLASS%">%SHUFFLE_LABEL%</button>
    </form>
  </div>
</body>
</html>
