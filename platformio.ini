[platformio]
src_dir = .
default_envs = cyd

[env]
platform = espressif32@~6.7.0
board = esp32dev
framework = arduino



lib_deps =
    wnatth3/WiFiManager
	bodmer/TFT_eSPI@^2.5.33
	;bitbank2/JPEGDEC@^1.2.8
	bitbank2/JPEGDEC
	greiman/SdFat@^2.2.2
	nitek/XPT2046_Bitbang_Slim@^2.0.0
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
	qrcode
	https://github.com/ayushsharma82/ElegantOTA.git


monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 460800
board_build.partitions=min_spiffs.csv
board_build.arduino.upstream_packages = no
build_flags =
	-DUSER_SETUP_LOADED
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DUSE_HSPI_PORT
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DLOAD_GLCD
	-DLOAD_FONT2
	-DLOAD_FONT4
	-DLOAD_FONT6
	-DLOAD_FONT7
	-DLOAD_FONT8
	-DLOAD_GFXFF
	-DSMOOTH_FONT=0
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1	


[env:cyd]
build_flags =
	${env.build_flags}
	-DILI9341_2_DRIVER




[env:cyd2usb]
build_flags =
	${env.build_flags}
	-DST7789_DRIVER
	-DTFT_INVERSION_OFF
	-DTFT_RGB_ORDER=TFT_BGR
	

[env:cyd2b]
build_flags =
	${env.build_flags}
	-DILI9341_2_DRIVER
	-DTFT_INVERSION_ON
	-DENV_CYD2B
	-DUSE_GAMMA_CORRECTION


# Touchscreen hardware probe builds.
# Flash one of these to verify whether the touch IC works on your CYD variant.
# They draw a green dot wherever a touch is detected and stream X/Y/Z to Serial.
# Use the env that matches your board's display driver.

[env:touch_probe_cyd]
build_flags =
	${env.build_flags}
	-DILI9341_2_DRIVER
	-DTOUCH_PROBE

[env:touch_probe_cyd2usb]
build_flags =
	${env.build_flags}
	-DST7789_DRIVER
	-DTFT_INVERSION_OFF
	-DTFT_RGB_ORDER=TFT_BGR
	-DTOUCH_PROBE

[env:touch_probe_cyd2b]
build_flags =
	${env.build_flags}
	-DILI9341_2_DRIVER
	-DTFT_INVERSION_ON
	-DENV_CYD2B
	-DUSE_GAMMA_CORRECTION
	-DTOUCH_PROBE